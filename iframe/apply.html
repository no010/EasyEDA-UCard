<!doctype html>
<html lang="zh-Hans">
    <head>
        <title>UCard 模板化生成</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <style>
            :root {
                --bg: #eef2f7;
                --card: #ffffff;
                --text: #1f2937;
                --muted: #6b7280;
                --line: #d6dde8;
                --primary: #0f766e;
                --primary-hover: #0b5d57;
                --danger: #b91c1c;
            }
            html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; }
            body { padding: 16px; }
            .card {
                background: var(--card);
                border: 1px solid var(--line);
                border-radius: 12px;
                padding: 16px;
                box-shadow: 0 6px 16px rgba(13, 36, 61, 0.08);
            }
            .title {
                font-size: 16px;
                font-weight: 700;
                margin-bottom: 12px;
            }
            .sub {
                color: var(--muted);
                font-size: 12px;
                margin-bottom: 12px;
            }
            .row {
                display: grid;
                grid-template-columns: 96px 1fr;
                gap: 8px;
                align-items: center;
                margin-bottom: 10px;
            }
            label {
                font-weight: 600;
                font-size: 12px;
            }
            select, input, textarea {
                width: 100%;
                border: 1px solid var(--line);
                border-radius: 8px;
                padding: 8px 10px;
                font: inherit;
                outline: none;
                background: #fff;
                color: var(--text);
            }
            textarea {
                resize: vertical;
            }
            select:focus, input:focus, textarea:focus {
                border-color: var(--primary);
                box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
            }
            .group {
                margin-top: 12px;
                border-top: 1px solid var(--line);
                padding-top: 10px;
            }
            .group-title {
                font-size: 12px;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: var(--muted);
                margin-bottom: 8px;
                font-weight: 700;
            }
            .field-help {
                grid-column: 2;
                margin-top: -4px;
                margin-bottom: 4px;
                color: var(--muted);
                font-size: 11px;
            }
            .meta {
                margin-bottom: 10px;
                border: 1px dashed var(--line);
                border-radius: 8px;
                padding: 8px;
                font-size: 12px;
                color: var(--muted);
                background: #fafbfd;
            }
            .error {
                color: var(--danger);
                font-size: 12px;
                margin-bottom: 8px;
                white-space: pre-wrap;
            }
            .is-hidden {
                display: none;
            }
            .actions {
                margin-top: 14px;
                padding-top: 10px;
                border-top: 1px solid var(--line);
                display: flex;
                justify-content: flex-end;
                gap: 8px;
            }
            button {
                border: 1px solid var(--line);
                background: #f5f7fa;
                color: var(--text);
                border-radius: 8px;
                padding: 8px 14px;
                cursor: pointer;
                font-weight: 600;
            }
            button:hover { background: #e9edf3; }
            .btn-primary {
                background: var(--primary);
                border-color: var(--primary);
                color: #fff;
            }
            .btn-primary:hover { background: var(--primary-hover); }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="title">2. 替换名片文本</div>
            <div class="sub">读取当前 PCB 文档中的所有文本图元，修改后点击替换。</div>

            <div id="errorBox" class="error is-hidden"></div>

            <div id="loadStatus" class="meta">正在读取 PCB 文本图元...</div>

            <div class="group">
                <div class="group-title">文本图元</div>
                <div id="fieldsContainer"></div>
            </div>

            <div class="actions">
                <button id="btnReload">重新读取</button>
                <button id="btnCancel">取消</button>
                <button id="btnApplyText" class="btn-primary">替换名片文本</button>
            </div>
        </div>

        <script>
            const IFRAME_LOG_PREFIX = '[UCard][Iframe]';
            let bootstrapEdaApi = null; try { bootstrapEdaApi = window.parent?.eda || window.top?.eda || window.eda; } catch(e) { console.error(e); }

            function bootstrapLog(message, type) {
                try {
                    bootstrapEdaApi?.sys_Log?.add?.(`${IFRAME_LOG_PREFIX} ${message}`, type || 1);
                } catch {
                    // ignore bootstrap logging failures
                }
            }

            bootstrapLog(`bootstrap start | readyState=${document.readyState} | hasWindowEda=${window.eda ? 'yes' : 'no'} | hasParentEda=${window.parent?.eda ? 'yes' : 'no'} | hasTopEda=${window.top?.eda ? 'yes' : 'no'}`);

            try {
            const edaApi = bootstrapEdaApi;
            const TOPIC_CLOSE = 'UCARD_CLOSE';
            const TOPIC_GET_ALL_PCB_TEXTS_REQUEST = 'UCARD_GET_ALL_PCB_TEXTS_REQUEST';
            const TOPIC_GET_ALL_PCB_TEXTS_RESPONSE = 'UCARD_GET_ALL_PCB_TEXTS_RESPONSE';
            const TOPIC_REPLACE_PCB_TEXTS_BY_ID = 'UCARD_REPLACE_PCB_TEXTS_BY_ID';

            const errorBox = document.getElementById('errorBox');
            const loadStatus = document.getElementById('loadStatus');
            const fieldsContainer = document.getElementById('fieldsContainer');
            const btnApplyText = document.getElementById('btnApplyText');

            const responseRouterTopics = new Set();
            const pendingRequests = new Map();
            let pcbItems = []; // [{id, text}]

            function logWithType(m, type) { try { if (!edaApi?.sys_Log?.add) return; edaApi.sys_Log.add(`${IFRAME_LOG_PREFIX} ${m}`, type); } catch {} }
            const logInfo = (m) => logWithType(m, 1);
            const logWarn = (m) => logWithType(m, 2);
            const logError = (m) => logWithType(m, 3);

            function showError(message) {
                errorBox.classList.toggle('is-hidden', !message);
                errorBox.textContent = message || '';
                if (message) logWarn(`showError | ${message}`);
            }

            function pushPublic(topic, payload) {
                if (!edaApi?.sys_MessageBus?.pushPublic) throw new Error('sys_MessageBus.pushPublic unavailable');
                edaApi.sys_MessageBus.pushPublic(topic, payload);
            }

            function pullPublic(topic, callback) {
                const bus = edaApi?.sys_MessageBus;
                if (!bus) throw new Error('sys_MessageBus unavailable');
                let registered = false, lastError = '';
                if (typeof bus.pullPublic === 'function') { try { bus.pullPublic(topic, callback); registered = true; } catch (e) { lastError = String(e); } }
                if (typeof bus.subscribePublic === 'function') { try { bus.subscribePublic(topic, callback); registered = true; } catch (e) { lastError = String(e); } }
                if (!registered) throw new Error(`listener registration failed: ${lastError || 'unavailable'}`);
            }

            function pendingKey(rt, id) { return `${rt}::${id}`; }
            function firstPendingKeyByTopic(rt) { const p = `${rt}::`; for (const k of pendingRequests.keys()) { if (k.startsWith(p)) return k; } return ''; }

            function unwrapBusMessage(v) {
                if (!v || typeof v !== 'object') return v;
                if (v.message && typeof v.message === 'object') return v.message;
                return v;
            }
            function looksLikeBusMessage(v) {
                return !!v && typeof v === 'object' && ('id' in v || 'requestId' in v || 'type' in v || 'payload' in v || 'error' in v || 'message' in v);
            }
            function extractBusMessage(args) {
                if (!Array.isArray(args) || !args.length) return undefined;
                for (let i = args.length - 1; i >= 0; i--) {
                    const c = unwrapBusMessage(args[i]);
                    if (looksLikeBusMessage(c)) return c;
                }
                if (args.length === 1) return unwrapBusMessage(args[0]);
                const [a, b, c] = args;
                if (typeof a === 'string' && c !== undefined) return unwrapBusMessage(c);
                if (typeof a === 'string') return unwrapBusMessage(b);
                return unwrapBusMessage(b ?? a);
            }
            function extractResponseId(msg) { return String(msg?.id ?? msg?.requestId ?? msg?.payload?.id ?? ''); }
            function responseTypeOf(msg) { return typeof msg?.type === 'string' ? msg.type : ''; }

            function ensureResponseRouter(responseTopic) {
                if (responseRouterTopics.has(responseTopic)) return;
                pullPublic(responseTopic, (...args) => {
                    const msg = extractBusMessage(args);
                    const id = extractResponseId(msg);
                    let key = id ? pendingKey(responseTopic, id) : '';
                    if (!key || !pendingRequests.has(key)) {
                        key = firstPendingKeyByTopic(responseTopic);
                        if (key && !id) logWarn(`response id missing, fallback | topic=${responseTopic}`);
                    }
                    if (!key) return;
                    const pending = pendingRequests.get(key);
                    if (!pending) return;
                    const msgType = responseTypeOf(msg);
                    if (!msgType) { logWarn(`response ignored: no type`); return; }
                    if (msgType !== pending.acceptType && msgType !== pending.errorType) { logWarn(`response ignored | type=${msgType}`); return; }
                    clearTimeout(pending.timeout);
                    pendingRequests.delete(key);
                    if (msgType === pending.acceptType) pending.resolve(msg);
                    else pending.reject(new Error(String(msg.error || 'request failed')));
                });
                responseRouterTopics.add(responseTopic);
                logInfo(`response router registered | topic=${responseTopic}`);
            }

            function request(topic, payload, responseTopic, acceptType, errorType, timeoutMs = 10000) {
                const requestId = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
                logInfo(`request start | topic=${topic} | id=${requestId}`);
                return new Promise((resolve, reject) => {
                    ensureResponseRouter(responseTopic);
                    const timeout = setTimeout(() => {
                        pendingRequests.delete(pendingKey(responseTopic, requestId));
                        logWarn(`request timeout | topic=${topic}`);
                        reject(new Error('request timeout'));
                    }, timeoutMs);
                    pendingRequests.set(pendingKey(responseTopic, requestId), { requestId, resolve, reject, acceptType, errorType, timeout });
                    pushPublic(topic, Object.assign({ id: requestId }, payload || {}));
                });
            }

            function inputId(id) { return `pcb-text-${id}`; }

            function renderItems(items) {
                fieldsContainer.innerHTML = '';
                if (items.length === 0) {
                    const msg = document.createElement('div');
                    msg.className = 'meta';
                    msg.textContent = '当前 PCB 中未找到任何文本图元。';
                    fieldsContainer.appendChild(msg);
                    btnApplyText.disabled = true;
                    return;
                }
                btnApplyText.disabled = false;
                items.forEach((item, index) => {
                    const row = document.createElement('div');
                    row.className = 'row';
                    row.style.alignItems = 'start';
                    const label = document.createElement('label');
                    label.setAttribute('for', inputId(item.id));
                    label.textContent = `[${index + 1}] ${item.text}`;
                    label.title = item.id;
                    label.style.paddingTop = '9px';
                    row.appendChild(label);
                    const ta = document.createElement('textarea');
                    ta.id = inputId(item.id);
                    ta.value = item.text;
                    ta.rows = item.text.includes('\n') ? Math.min(item.text.split('\n').length + 1, 6) : 1;
                    row.appendChild(ta);
                    fieldsContainer.appendChild(row);
                });
            }

            async function loadPcbTexts() {
                showError('');
                loadStatus.textContent = '正在读取 PCB 文本图元...';
                logInfo('loadPcbTexts start');
                const response = await request(
                    TOPIC_GET_ALL_PCB_TEXTS_REQUEST,
                    {},
                    TOPIC_GET_ALL_PCB_TEXTS_RESPONSE,
                    'UCARD_ALL_PCB_TEXTS',
                    'UCARD_ALL_PCB_TEXTS_ERROR',
                    15000,
                );
                pcbItems = Array.isArray(response.items) ? response.items : [];
                logInfo(`loadPcbTexts done | count=${pcbItems.length}`);
                loadStatus.textContent = `共 ${pcbItems.length} 个文本图元`;
                renderItems(pcbItems);
            }

            function closeDialog() {
                try { pushPublic(TOPIC_CLOSE, {}); } catch { window.close(); }
            }

            function applyTexts() {
                logInfo('applyTexts start');
                const replacements = {};
                let changedCount = 0;
                for (const item of pcbItems) {
                    const el = document.getElementById(inputId(item.id));
                    const newText = el?.value ?? '';
                    if (newText !== item.text) {
                        replacements[item.id] = newText;
                        changedCount++;
                    }
                }
                if (changedCount === 0) {
                    showError('没有修改任何内容');
                    return;
                }
                logInfo(`applyTexts | changedCount=${changedCount}`);
                try {
                    pushPublic(TOPIC_REPLACE_PCB_TEXTS_BY_ID, { replacements, timestamp: Date.now() });
                    logInfo('applyTexts pushPublic | TOPIC_REPLACE_PCB_TEXTS_BY_ID sent');
                } catch (error) {
                    logError(`applyTexts pushPublic failed | ${String(error)}`);
                    showError(`无法发送请求：${String(error)}`);
                }
            }

            document.getElementById('btnCancel').addEventListener('click', closeDialog);
            document.getElementById('btnReload').addEventListener('click', async () => {
                logInfo('click btnReload');
                try { await loadPcbTexts(); } catch (error) { showError(`读取失败：${String(error)}`); }
            });
            btnApplyText.addEventListener('click', () => {
                logInfo('click btnApplyText');
                applyTexts();
            });

            (async () => {
                try {
                    logInfo('iframe init start');
                    await loadPcbTexts();
                    logInfo('iframe init done');
                } catch (error) {
                    showError(`初始化失败：${String(error)}`);
                }
            })();
            } catch (error) {
                bootstrapLog(`bootstrap fatal | ${String(error)}`, 3);
            }
        </script>
    </body>
</html>
